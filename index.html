<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="An interactive Hello World built with Meta's Immersive Web SDK."
    />
    <title>IWSDK Hello World</title>
  </head>
  <body>
    <main id="app-shell">
      <div id="scene-container" aria-label="Interactive 3D scene"></div>

      <section id="hud" aria-label="Experience controls">
        <p class="eyebrow">Immersive Web SDK</p>
        <h1>IWSDK Hello World</h1>
        <p id="status" role="status">Loading the 3D world…</p>
        <div class="button-row">
          <button id="enter-xr" data-testid="enter-xr" type="button" disabled>
            Enter VR
          </button>
          <button id="toggle-motion" data-testid="toggle-motion" type="button">
            Pause float
          </button>
          <button id="reset-view" data-testid="reset-view" type="button" disabled>
            Reset view
          </button>
          <a
            id="concepts-link"
            class="hud-link"
            data-testid="concepts-link"
            href="./docs/design/loop-engineer-concepts/index.html"
            target="_blank"
            rel="noopener"
            aria-label="Open the Loop Engineer concept book in a new tab"
          >
            Explore concepts ↗
          </a>
        </div>
        <p class="hint">
          <span class="desktop-hint">
            Move with WASD / arrows. Point, touch, or grab the letters.
          </span>
          <span class="mobile-hint">
            Use the arrows to move. Touch a letter to interact.
          </span>
        </p>
      </section>

      <nav id="touch-controls" aria-label="Mobile movement controls">
        <button type="button" data-key="KeyW" aria-label="Move forward">▲</button>
        <div>
          <button type="button" data-key="KeyA" aria-label="Move left">◀</button>
          <button type="button" data-key="KeyS" aria-label="Move backward">▼</button>
          <button type="button" data-key="KeyD" aria-label="Move right">▶</button>
        </div>
      </nav>
    </main>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
