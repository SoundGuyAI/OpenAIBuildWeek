<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Kaiju QA is a tactile 3D toy lab for testing a helpful baby kaiju."
    />
    <meta name="theme-color" content="#0B1620" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230b1620'/%3E%3Cpath d='M15 43 20 20l10 8 8-13 11 28Z' fill='%235eead4'/%3E%3Ccircle cx='27' cy='37' r='3' fill='%230b1620'/%3E%3Ccircle cx='40' cy='35' r='3' fill='%230b1620'/%3E%3C/svg%3E"
    />
    <title>Kaiju QA</title>
  </head>
  <body>
    <main class="game-shell">
      <div
        id="scene-container"
        role="region"
        aria-label="Interactive 3D Kaiju QA toy lab"
        aria-describedby="keyboard-help semantic-instruction semantic-release"
        aria-keyshortcuts="ArrowLeft ArrowRight ArrowUp ArrowDown Enter Space"
        tabindex="0"
      ></div>

      <section class="game-hud" aria-label="Game status and utilities">
        <header class="hud-topline">
          <div class="brand-lockup" aria-label="Kaiju QA">
            <span class="brand-mark" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </span>
            <h1><span>KAIJU</span> QA</h1>
          </div>

          <div class="progress-chip" aria-label="Current level progress">
            <span id="level-label">Level 1</span>
            <span class="chip-divider" aria-hidden="true"></span>
            <span id="progress-label">0 / 3</span>
          </div>
        </header>

        <nav class="utility-dock" aria-label="Game utilities">
          <button id="enter-xr" type="button" aria-label="Enter immersive mode" disabled>
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M3.5 8.5h17v8h-5l-2-3h-3l-2 3h-5z" />
              <path d="M7.5 11.5h2m5 0h2" />
            </svg>
            <span>VR</span>
          </button>

          <button
            id="toggle-motion"
            type="button"
            aria-label="Reduce motion"
            aria-pressed="false"
          >
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M4 8h10m-7 4h13M4 16h10" />
            </svg>
            <span>Motion</span>
          </button>

          <button id="reset-lab" type="button" aria-label="Reset lab">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M5 7v5h5" />
              <path d="M6.5 16.5a7 7 0 1 0-.6-8.2L5 10" />
            </svg>
            <span>Reset</span>
          </button>

          <button
            id="toggle-audio"
            type="button"
            aria-label="Mute audio"
            aria-pressed="false"
          >
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M4 10h4l5-4v12l-5-4H4z" />
              <path d="M16 9a4 4 0 0 1 0 6m2-8a7 7 0 0 1 0 10" />
            </svg>
            <span>Audio</span>
          </button>

          <button id="replay-narration" type="button" aria-label="Replay narration">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M8 8H4V4" />
              <path d="M5 8a8 8 0 1 1-1 7" />
              <path d="m10 9 6 3-6 3z" />
            </svg>
            <span>Replay</span>
          </button>

          <a
            id="concepts-link"
            href="./docs/design/loop-engineer-concepts/index.html"
            target="_blank"
            rel="noopener"
            aria-label="Open concept book in a new tab"
          >
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M5 5.5h9a3 3 0 0 1 3 3V19H8a3 3 0 0 0-3 3z" />
              <path d="M17 8.5h2V19h-9a3 3 0 0 0-3 3" />
            </svg>
            <span>Concepts</span>
          </a>
        </nav>

        <p id="status">
          Preparing the tactile lab…
        </p>

        <p id="xr-status" class="xr-status"></p>

        <div
          id="loading-state"
          aria-busy="true"
        >
          <span class="loading-spinner" aria-hidden="true"></span>
          <span>Building the toy city</span>
        </div>

        <p id="caption"></p>

        <p id="keyboard-hint" class="keyboard-hint" aria-hidden="true"></p>

        <section
          id="semantic-state"
          class="visually-hidden"
          aria-labelledby="semantic-title"
        >
          <h2 id="semantic-title">Current Kaiju QA state</h2>
          <p id="keyboard-help">
            Keyboard controls: focus the 3D lab, use arrow keys to choose the
            current world action, then press Enter or Space to perform it.
          </p>
          <p id="semantic-instruction"></p>
          <h3>Rule cartridge scopes</h3>
          <ul id="semantic-rules"></ul>
          <h3>Scenario evidence</h3>
          <ul id="semantic-evidence"></ul>
          <p id="semantic-release"></p>
        </section>

        <div
          id="switch-actions"
          class="switch-actions"
          aria-label="Accessible world actions"
        ></div>

        <p
          id="announcement"
          class="visually-hidden"
          role="status"
          aria-live="polite"
          aria-atomic="true"
        ></p>
      </section>
    </main>

    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
