name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Validate and package site
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pages: read

    steps:
      - name: Require deployment from main
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "::error::GitHub Pages deployments must run from main. Re-run this workflow with the main branch selected."
            exit 1
          fi

      - name: Verify GitHub Pages configuration
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          settings_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/settings/pages"
          response_file="$(mktemp)"

          status="$({
            curl --silent --show-error \
              --output "${response_file}" \
              --write-out '%{http_code}' \
              --header 'Accept: application/vnd.github+json' \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/pages"
          })"

          if [[ "${status}" == "404" ]]; then
            echo "::error::GitHub Pages is not enabled. Open ${settings_url}, set Build and deployment > Source to GitHub Actions, then re-run this workflow."
            exit 1
          fi

          if [[ "${status}" != "200" ]]; then
            message="$(jq -r '.message // "Unknown GitHub API error"' "${response_file}" 2>/dev/null || true)"
            echo "::error::Unable to read GitHub Pages settings (HTTP ${status}): ${message}"
            exit 1
          fi

          build_type="$(jq -r '.build_type // empty' "${response_file}")"
          if [[ "${build_type}" != "workflow" ]]; then
            echo "::error::GitHub Pages is configured with build type '${build_type:-unknown}'. Open ${settings_url} and set Build and deployment > Source to GitHub Actions."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Install dependencies
        shell: bash
        run: |
          if [[ -f package-lock.json ]]; then
            npm ci --no-audit --no-fund
          else
            echo "::warning file=package.json::package-lock.json is missing; using a non-frozen install. Commit a lockfile for reproducible deploys."
            npm install --no-package-lock --no-audit --no-fund
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Build production site
        run: npm run build

      - name: Install Chromium system dependencies
        run: npx playwright install --with-deps chromium

      - name: Run desktop and mobile Chromium E2E
        run: >-
          npm run test:e2e:run --
          --project=desktop-chromium
          --project=mobile-chromium

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: false

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist
          retention-days: 1

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-main-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  deploy:
    name: Publish site
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
