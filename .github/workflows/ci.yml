name: Pull request CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Typecheck, build, and browser E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Install dependencies
        shell: bash
        run: |
          if [[ -f package-lock.json ]]; then
            npm ci --no-audit --no-fund
          else
            echo "::warning file=package.json::package-lock.json is missing; using a non-frozen install. Commit a lockfile for reproducible CI."
            npm install --no-package-lock --no-audit --no-fund
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Build production site
        run: npm run build

      - name: Install Chromium system dependencies
        run: npx playwright install --with-deps chromium

      - name: Run desktop and mobile Chromium E2E
        run: >-
          npm run test:e2e:run --
          --project=desktop-chromium
          --project=mobile-chromium

      - name: Upload desktop and mobile evidence screenshots
        uses: actions/upload-artifact@v7
        with:
          name: browser-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: test-results/evidence/
          if-no-files-found: error
          retention-days: 14

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-pr-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
