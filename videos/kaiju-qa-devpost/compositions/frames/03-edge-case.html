        tl.fromTo(

        tl.fromTo(

          { opacity: 0, x: -80, y: 28, scale: 0.92 },
          { opacity: 1, x: 0, y: 0, scale: 1, duration: 0.36, ease: "power3.out", immediateRender: false },
          2.0,

        tl.to("#f03-kaiju-run", { x: 286, y: 0, duration: 0.82, ease: "power2.inOut" }, 2.36);
        tl.to("#f03-kaiju-run", { x: 520, y: -70, duration: 0.82, ease: "power2.inOut" }, 3.18);
        tl.to("#f03-kaiju-run", { x: 736, y: -70, duration: 0.78, ease: "power2.inOut" }, 4.0);
        tl.to("#f03-kaiju-run", { x: 908, y: -26, duration: 0.62, ease: "power2.inOut" }, 4.78);

        // Scene 3: the different result lands; two blocks tip and the route breaks.

          "#f03-tower-top-a",
          { rotation: 0, x: 0, y: 0 },
          { rotation: -28, x: -44, y: 56, duration: 0.55, ease: "power3.inOut", immediateRender: false },

        tl.to("#f03-test-stage", { borderColor: "#ff6b5e", duration: 0.28, ease: "power2.out" }, 5.4);
        tl.to("#f03-route-intact", { opacity: 0.1, duration: 0.28, ease: "power1.out" }, 5.4);
        tl.fromTo(
          "#f03-broken-route",
          { opacity: 0, scaleX: 0.05 },
          { opacity: 1, scaleX: 1, duration: 0.52, ease: "power3.out", immediateRender: false },
