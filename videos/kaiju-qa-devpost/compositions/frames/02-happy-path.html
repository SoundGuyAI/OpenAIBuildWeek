      <script>
        (() => {
          window.__timelines = window.__timelines || {};

          const route = document.getElementById("f02-route");
          const routeLength = route.getTotalLength();
          route.style.strokeDasharray = String(routeLength);
          route.style.strokeDashoffset = String(routeLength);

          const tl = gsap.timeline({ paused: true });

          gsap.set(["#f02-kaiju", "#f02-car"], { opacity: 0 });
          gsap.set(["#f02-criterion-1", "#f02-criterion-2", "#f02-criterion-3", "#f02-run-button", "#f02-run-mode"], { opacity: 0 });
          gsap.set(["#f02-status-pass", "#f02-lane-pass", "#f02-road-clear", "#f02-run-active", "#f02-release-stamp", "#f02-interlock", "#f02-car-pass", "#f02-partial-pass", "#f02-pointer"], { opacity: 0 });
          gsap.set(["#f02-ripple-1", "#f02-ripple-2", "#f02-ripple-3"], { opacity: 0, scale: 0 });

          // Scene 1 (0.0-2.2): establish the 70/30 tabletop and assemble three criteria.
          tl.fromTo(
            "#f02-camera",
            { x: 0, y: 12, scale: 1.025 },
            { x: 0, y: 0, scale: 1, duration: 1.55, ease: "power2.out" },
            0,
          );
          tl.fromTo(
            "#f02-kaiju",
            { opacity: 0, scale: 0.82, x: -28, y: 18 },
            { opacity: 1, scale: 1, x: 0, y: 0, duration: 0.48, ease: "back.out(1.35)", immediateRender: false },
            0.08,
          );
          tl.fromTo(
            "#f02-car",
            { opacity: 0, scale: 0.86, y: -18 },
            { opacity: 1, scale: 1, y: 0, duration: 0.42, ease: "power3.out", immediateRender: false },
            0.18,
          );

          ["#f02-criterion-1", "#f02-criterion-2", "#f02-criterion-3"].forEach((selector, index) => {
            tl.fromTo(
              selector,
              { opacity: 0, x: 82, scale: 0.96 },
              { opacity: 1, x: 0, scale: 1, duration: 0.48, ease: "power4.out", immediateRender: false },
              0.34 + index * 0.56,
            );
          });
