<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 330" role="img" aria-labelledby="title desc">
  <title id="title">Four-hour smallest-complete-game build plan</title>
  <desc id="desc">A four-hour schedule prioritizes a full deterministic loop, cross-platform input, feedback, evidence, and deployment before optional art polish.</desc>
  <rect width="1200" height="330" rx="32" fill="#f7f4ed"/>
  <text x="48" y="58" fill="#17283a" font-family="system-ui,Segoe UI,sans-serif" font-size="31" font-weight="850">Four hours: protect the complete loop</text>
  <text x="48" y="88" fill="#5a6b7b" font-family="system-ui,Segoe UI,sans-serif" font-size="17">No backend, no physics, one room, deterministic outcomes, one-action retry.</text>
  <g transform="translate(48 122)" font-family="system-ui,Segoe UI,sans-serif">
    <g transform="translate(0)"><rect width="170" height="144" rx="20" fill="#d7f3fb"/><text x="16" y="29" fill="#0c5570" font-size="14" font-weight="900">0:00–0:30</text><text x="16" y="58" fill="#15364a" font-size="19" font-weight="850">Lock the arc</text><text x="16" y="84" fill="#315268" font-size="14">Goal, three states,</text><text x="16" y="104" fill="#315268" font-size="14">one failure, one win.</text></g>
    <g transform="translate(180)"><rect width="170" height="144" rx="20" fill="#e5dcfa"/><text x="16" y="29" fill="#5b3a87" font-size="14" font-weight="900">0:30–1:15</text><text x="16" y="58" fill="#382452" font-size="19" font-weight="850">Build the verb</text><text x="16" y="84" fill="#594371" font-size="14">One Interactable,</text><text x="16" y="104" fill="#594371" font-size="14">pointer + touch + XR.</text></g>
    <g transform="translate(360)"><rect width="170" height="144" rx="20" fill="#f8ddcf"/><text x="16" y="29" fill="#85402d" font-size="14" font-weight="900">1:15–2:10</text><text x="16" y="58" fill="#542f24" font-size="19" font-weight="850">Run the loop</text><text x="16" y="84" fill="#704739" font-size="14">Baseline, evidence,</text><text x="16" y="104" fill="#704739" font-size="14">adjustment, rerun.</text></g>
    <g transform="translate(540)"><rect width="170" height="144" rx="20" fill="#dff2d0"/><text x="16" y="29" fill="#356b27" font-size="14" font-weight="900">2:10–2:50</text><text x="16" y="58" fill="#27431f" font-size="19" font-weight="850">Teach visibly</text><text x="16" y="84" fill="#47623f" font-size="14">Shapes + motion +</text><text x="16" y="104" fill="#47623f" font-size="14">plain language cues.</text></g>
    <g transform="translate(720)"><rect width="170" height="144" rx="20" fill="#ffeebd"/><text x="16" y="29" fill="#7b5a08" font-size="14" font-weight="900">2:50–3:20</text><text x="16" y="58" fill="#55400b" font-size="19" font-weight="850">Polish the hero</text><text x="16" y="84" fill="#6e5a28" font-size="14">One transformation,</text><text x="16" y="104" fill="#6e5a28" font-size="14">audio optional.</text></g>
    <g transform="translate(900)"><rect width="204" height="144" rx="20" fill="#d8e7fb"/><text x="16" y="29" fill="#285384" font-size="14" font-weight="900">3:20–4:00</text><text x="16" y="58" fill="#213a59" font-size="19" font-weight="850">Verify &amp; publish</text><text x="16" y="84" fill="#405a78" font-size="14">Typecheck, build, E2E,</text><text x="16" y="104" fill="#405a78" font-size="14">screens, deploy, README.</text></g>
  </g>
</svg>
