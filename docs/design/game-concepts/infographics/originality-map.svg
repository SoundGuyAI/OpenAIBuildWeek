<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Originality positioning map</title>
  <desc id="desc">Twenty numbered concepts are distributed from local to systemic action and from puzzle certainty to expressive emergence.</desc>
  <rect width="1200" height="900" rx="28" fill="#f4f0e6"/>
  <text x="600" y="70" fill="#10141d" font-family="Arial, sans-serif" font-size="42" font-weight="700" text-anchor="middle">Verb x world-response constellation</text>
  <line x1="130" y1="760" x2="1080" y2="760" stroke="#526173" stroke-width="4"/>
  <line x1="130" y1="760" x2="130" y2="145" stroke="#526173" stroke-width="4"/>
  <text x="130" y="815" fill="#445064" font-family="Arial, sans-serif" font-size="24">precise / local</text>
  <text x="1080" y="815" fill="#445064" font-family="Arial, sans-serif" font-size="24" text-anchor="end">systemic / world-scale</text>
  <text x="55" y="480" fill="#445064" font-family="Arial, sans-serif" font-size="24" transform="rotate(-90 55 480)" text-anchor="middle">puzzle certainty to expressive emergence</text>
  <g font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#10141d">
    <g fill="#31d9e6"><circle cx="880" cy="370" r="25"/><text x="880" y="377" fill="#10141d">01</text></g>
    <g fill="#9a6cff"><circle cx="310" cy="270" r="25"/><text x="310" y="277" fill="#10141d">02</text></g>
    <g fill="#478cff"><circle cx="690" cy="250" r="25"/><text x="690" y="257" fill="#10141d">03</text></g>
    <g fill="#38d996"><circle cx="860" cy="520" r="25"/><text x="860" y="527" fill="#10141d">04</text></g>
    <g fill="#ff8a3d"><circle cx="760" cy="180" r="25"/><text x="760" y="187" fill="#10141d">05</text></g>
    <g fill="#9a6cff"><circle cx="270" cy="610" r="25"/><text x="270" y="617" fill="#10141d">06</text></g>
    <g fill="#31d9e6"><circle cx="720" cy="590" r="25"/><text x="720" y="597" fill="#10141d">07</text></g>
    <g fill="#9a6cff"><circle cx="390" cy="520" r="25"/><text x="390" y="527" fill="#10141d">08</text></g>
    <g fill="#478cff"><circle cx="520" cy="210" r="25"/><text x="520" y="217" fill="#10141d">09</text></g>
    <g fill="#38d996"><circle cx="910" cy="430" r="25"/><text x="910" y="437" fill="#10141d">10</text></g>
    <g fill="#ff8a3d"><circle cx="470" cy="310" r="25"/><text x="470" y="317" fill="#10141d">11</text></g>
    <g fill="#ff8a3d"><circle cx="620" cy="150" r="25"/><text x="620" y="157" fill="#10141d">12</text></g>
    <g fill="#31d9e6"><circle cx="965" cy="610" r="25"/><text x="965" y="617" fill="#10141d">13</text></g>
    <g fill="#31d9e6"><circle cx="770" cy="670" r="25"/><text x="770" y="677" fill="#10141d">14</text></g>
    <g fill="#ff8a3d"><circle cx="560" cy="125" r="25"/><text x="560" y="132" fill="#10141d">15</text></g>
    <g fill="#38d996"><circle cx="650" cy="450" r="25"/><text x="650" y="457" fill="#10141d">16</text></g>
    <g fill="#38d996"><circle cx="430" cy="650" r="25"/><text x="430" y="657" fill="#10141d">17</text></g>
    <g fill="#9a6cff"><circle cx="340" cy="430" r="25"/><text x="340" y="437" fill="#10141d">18</text></g>
    <g fill="#478cff"><circle cx="510" cy="570" r="25"/><text x="510" y="577" fill="#10141d">19</text></g>
    <g fill="#478cff"><circle cx="610" cy="680" r="25"/><text x="610" y="687" fill="#10141d">20</text></g>
  </g>
  <text x="600" y="855" fill="#445064" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">Positions communicate portfolio spread, not proof of absolute novelty.</text>
</svg>
