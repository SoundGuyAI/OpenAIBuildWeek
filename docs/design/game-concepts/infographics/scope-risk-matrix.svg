<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Hackathon scope and risk matrix</title>
  <desc id="desc">Concepts are plotted by implementation effort and integration uncertainty, with a buildable front highlighting safer prototypes.</desc>
  <rect width="1200" height="800" rx="28" fill="#10141d"/>
  <text x="600" y="68" fill="#f4f0e6" font-family="Arial, sans-serif" font-size="42" font-weight="700" text-anchor="middle">Hackathon weather chart</text>
  <line x1="135" y1="690" x2="1080" y2="690" stroke="#526173" stroke-width="4"/>
  <line x1="135" y1="690" x2="135" y2="135" stroke="#526173" stroke-width="4"/>
  <path d="M135 690 C360 510 520 455 680 410" fill="none" stroke="#38d996" stroke-width="12" opacity=".45"/>
  <text x="350" y="580" fill="#38d996" font-family="Arial, sans-serif" font-size="24" font-weight="700" transform="rotate(-26 350 580)">two-day buildable front</text>
  <text x="135" y="742" fill="#b7c0cc" font-family="Arial, sans-serif" font-size="22">less effort</text>
  <text x="1080" y="742" fill="#b7c0cc" font-family="Arial, sans-serif" font-size="22" text-anchor="end">more effort</text>
  <text x="62" y="430" fill="#b7c0cc" font-family="Arial, sans-serif" font-size="22" transform="rotate(-90 62 430)" text-anchor="middle">integration uncertainty</text>
  <g font-family="Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#10141d">
    <g fill="#31d9e6"><circle cx="290" cy="590" r="32"/><text x="290" y="596" fill="#10141d">01</text></g>
    <g fill="#9a6cff"><circle cx="750" cy="300" r="28"/><text x="750" y="306" fill="#10141d">02</text></g>
    <g fill="#478cff"><circle cx="430" cy="520" r="29"/><text x="430" y="526" fill="#10141d">03</text></g>
    <g fill="#38d996"><circle cx="520" cy="470" r="27"/><text x="520" y="476" fill="#10141d">04</text></g>
    <g fill="#ff8a3d"><circle cx="850" cy="245" r="30"/><text x="850" y="251" fill="#10141d">05</text></g>
    <g fill="#9a6cff"><circle cx="610" cy="380" r="25"/><text x="610" y="386" fill="#10141d">06</text></g>
    <g fill="#31d9e6"><circle cx="395" cy="600" r="26"/><text x="395" y="606" fill="#10141d">07</text></g>
    <g fill="#9a6cff"><circle cx="650" cy="430" r="30"/><text x="650" y="436" fill="#10141d">08</text></g>
    <g fill="#478cff"><circle cx="410" cy="445" r="28"/><text x="410" y="451" fill="#10141d">09</text></g>
    <g fill="#38d996"><circle cx="550" cy="545" r="26"/><text x="550" y="551" fill="#10141d">10</text></g>
    <g fill="#ff8a3d"><circle cx="1010" cy="170" r="34"/><text x="1010" y="176" fill="#10141d">11</text></g>
    <g fill="#ff8a3d"><circle cx="790" cy="360" r="26"/><text x="790" y="366" fill="#10141d">12</text></g>
    <g fill="#31d9e6"><circle cx="330" cy="510" r="27"/><text x="330" y="516" fill="#10141d">13</text></g>
    <g fill="#31d9e6"><circle cx="300" cy="425" r="31"/><text x="300" y="431" fill="#10141d">14</text></g>
    <g fill="#ff8a3d"><circle cx="670" cy="250" r="29"/><text x="670" y="256" fill="#10141d">15</text></g>
    <g fill="#38d996"><circle cx="470" cy="355" r="25"/><text x="470" y="361" fill="#10141d">16</text></g>
    <g fill="#38d996"><circle cx="280" cy="650" r="24"/><text x="280" y="656" fill="#10141d">17</text></g>
    <g fill="#9a6cff"><circle cx="360" cy="560" r="25"/><text x="360" y="566" fill="#10141d">18</text></g>
    <g fill="#478cff"><circle cx="455" cy="580" r="28"/><text x="455" y="586" fill="#10141d">19</text></g>
    <g fill="#478cff"><circle cx="500" cy="500" r="27"/><text x="500" y="506" fill="#10141d">20</text></g>
  </g>
  <text x="600" y="775" fill="#b7c0cc" font-family="Arial, sans-serif" font-size="19" text-anchor="middle">Bubble size represents content burden; prototype the riskiest causal rule first.</text>
</svg>
