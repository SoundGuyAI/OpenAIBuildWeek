<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Universal game loop</title>
  <desc id="desc">Five connected stages show read, choose, act, world responds, and learn returning to read.</desc>
  <rect width="1200" height="560" rx="28" fill="#10141d"/>
  <path d="M174 280 H1026" stroke="#526173" stroke-width="12" stroke-linecap="round"/>
  <path d="M1010 260 L1040 280 L1010 300" fill="none" stroke="#526173" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M1030 330 C890 510 310 510 170 330" fill="none" stroke="#526173" stroke-width="8"/>
  <path d="M190 348 L164 324 L198 318" fill="none" stroke="#526173" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <g font-family="Arial, sans-serif" font-weight="700" text-anchor="middle" fill="#10141d">
    <g><circle cx="175" cy="280" r="70" fill="#9a6cff"/><text x="175" y="288" font-size="30">READ</text></g>
    <g><circle cx="388" cy="280" r="70" fill="#31d9e6"/><text x="388" y="288" font-size="30">CHOOSE</text></g>
    <g><circle cx="600" cy="280" r="70" fill="#ff8a3d"/><text x="600" y="288" font-size="30">ACT</text></g>
    <g><circle cx="813" cy="280" r="70" fill="#38d996"/><text x="813" y="274" font-size="26">WORLD</text><text x="813" y="306" font-size="26">RESPONDS</text></g>
    <g><circle cx="1025" cy="280" r="70" fill="#d9a441"/><text x="1025" y="288" font-size="30">LEARN</text></g>
  </g>
  <text x="600" y="88" fill="#f4f0e6" font-family="Arial, sans-serif" font-size="38" font-weight="700" text-anchor="middle">One readable action creates one visible consequence</text>
  <text x="600" y="502" fill="#b7c0cc" font-family="Arial, sans-serif" font-size="24" text-anchor="middle">The same decision repeats with better information, not more instructions.</text>
</svg>
