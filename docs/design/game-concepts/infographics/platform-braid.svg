<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 720" role="img" aria-labelledby="title desc">
  <title id="title">Three platform inputs converge on one consequence</title>
  <desc id="desc">Desktop, mobile, and XR input lanes braid into a shared game verb and the same world response.</desc>
  <rect width="1440" height="720" rx="28" fill="#10141d"/>
  <text x="720" y="82" fill="#f4f0e6" font-family="Arial, sans-serif" font-size="42" font-weight="700" text-anchor="middle">Three inputs. One consequence.</text>
  <g font-family="Arial, sans-serif" font-weight="700" font-size="28">
    <rect x="70" y="175" width="240" height="88" rx="18" fill="#31d9e6"/><text x="190" y="230" fill="#10141d" text-anchor="middle">DESKTOP</text>
    <rect x="70" y="316" width="240" height="88" rx="18" fill="#f257a6"/><text x="190" y="371" fill="#10141d" text-anchor="middle">MOBILE</text>
    <rect x="70" y="457" width="240" height="88" rx="18" fill="#38d996"/><text x="190" y="512" fill="#10141d" text-anchor="middle">XR</text>
  </g>
  <path d="M310 219 C520 219 555 360 700 360" fill="none" stroke="#31d9e6" stroke-width="18" opacity=".9"/>
  <path d="M310 360 H700" fill="none" stroke="#f257a6" stroke-width="18" opacity=".9"/>
  <path d="M310 501 C520 501 555 360 700 360" fill="none" stroke="#38d996" stroke-width="18" opacity=".9"/>
  <circle cx="760" cy="360" r="102" fill="#ff8a3d"/>
  <text x="760" y="350" fill="#10141d" font-family="Arial, sans-serif" font-size="30" font-weight="700" text-anchor="middle">SHARED</text>
  <text x="760" y="388" fill="#10141d" font-family="Arial, sans-serif" font-size="30" font-weight="700" text-anchor="middle">VERB</text>
  <path d="M862 360 H1080" stroke="#ff8a3d" stroke-width="18"/>
  <path d="M1050 330 L1100 360 L1050 390" fill="none" stroke="#ff8a3d" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="1100" y="275" width="270" height="170" rx="24" fill="#9a6cff"/>
  <text x="1235" y="348" fill="#10141d" font-family="Arial, sans-serif" font-size="30" font-weight="700" text-anchor="middle">SAME WORLD</text>
  <text x="1235" y="388" fill="#10141d" font-family="Arial, sans-serif" font-size="30" font-weight="700" text-anchor="middle">RESPONSE</text>
  <text x="720" y="642" fill="#b7c0cc" font-family="Arial, sans-serif" font-size="25" text-anchor="middle">Different gestures are allowed. Different goals, rules, or endings are not.</text>
</svg>
